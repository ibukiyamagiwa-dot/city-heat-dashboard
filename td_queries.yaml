# TOKYO CLIMB — TD（Topic Delta）のクエリ集合定義
#
# TD の操作定義（卒論の方法論セクションに対応）:
#   TD(駅, d) = ( M(駅, d) - M(駅, d-1) ) / max( M(駅, d-1), 1 ) × 100 [%]
#   M(駅, d)  = 日 d の固定観測窓に、下記クエリ集合 Q(駅) のいずれかに
#               一致した公開投稿の件数（集計のみ・個人は特定しない）
#
# 観測手順（手動運用時）は TD_DATA_GUIDE.md を参照。
# クエリを変更した場合は必ず changelog に追記すること（監査可能性の担保）。
#
# tier:
#   A = 毎日入力する優先駅（15駅）
#   B = 余力があれば入力する駅（未入力の日は「未知（❓）」ノードになる）

policy:
  count_unit: "固定観測窓内の投稿件数（上限50。50件を超えたら50と記録）"
  privacy: "件数のみを記録する。投稿本文・アカウント名は記録しない"
  trust_level: "low（SNS言及はあくまで話題性の代理指標）"

changelog:
  - date: "2026-06-11"
    note: "初版。全37駅に基本クエリ「<駅名>駅」を定義。tier A 15駅を選定"

stations:
  # ---- tier A（毎日入力する15駅） ----
