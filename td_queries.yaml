  harajuku:      { tier: A, queries: ["原宿駅"] }
  ebisu:         { tier: A, queries: ["恵比寿駅"], note: "ビール銘柄と同名のため「駅」付きで観測" }
  meguro:        { tier: A, queries: ["目黒駅"] }
