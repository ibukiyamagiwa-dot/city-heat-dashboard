# 卒業研究で使うデータソース定義です。
# trust_level:
#   high   = 実データとして扱える
#   medium = 参考値として扱う
#   low    = 仮説値・固定値。画面上で必ず明示する

weather:
  name: "Open-Meteo 現在気象データ"
  category: "気象"
  acquisition: "公式API"
  trust_level: "high"
  current_usage: "気温・降水量・風速を取得し、都市活動のしやすさの補助指標として使用（気温は temp_score と heat_penalty に分離）"
  audit_rule: "取得時刻・出典・API失敗時のフォールバック有無を記録。28℃超は heat_penalty で猛暑減点し、temp_score だけが満点にならないこと"

culture_venue:
  name: "劇場・音楽堂（社会教育調査）"
  category: "文化施設"
  acquisition: "urban_indicators.csv（文科省 社会教育調査 令和3年度）"
  trust_level: "medium"
  current_usage: "event_venues を culture_venue_bonus に正規化してスコアに使用"
  audit_rule: "施設数は都道府県単位の公的統計。現代エンタメ全体ではなく、文化施設指標として明示する"

modern_entertainment:
  name: "現代エンタメ施設（OSM）"
  category: "現代エンタメ"
  acquisition: "OpenStreetMap / Overpass API（都市中心から半径15kmのカテゴリ別件数）"
  trust_level: "low"
  current_usage: "cinema / museum / stadium / theme_park / arts_centre / nightclub / theatre / sports_centre を取得し、合計を modern_entertainment_bonus に正規化して使用"
  audit_rule: "OSMは登録密度の地域差、タグ表記の揺れ、node/way/relationの重複カウントが起こりうるため、公的統計と分けて補助指標として表示する"
  osm_tags:
    cinema: "amenity=cinema"
    museum: "tourism=museum"
    stadium: "leisure=stadium"
    theme_park: "tourism=theme_park"
    arts_centre: "amenity=arts_centre"
    nightclub: "amenity=nightclub"
    theatre: "amenity=theatre"
    sports_centre: "leisure=sports_centre"

population:
  name: "都道府県人口"
  category: "人口"
  acquisition: "urban_indicators.csv（総務省 人口推計 2023年10月1日現在）"
  trust_level: "medium"
  current_usage: "venues_per_100k / entertainment_per_100k の分母として使用"
  audit_rule: "都市名ではなく都道府県単位で比較している点を明示する"

pedestrian_flow:
  name: "人流・混雑データ"
  category: "人流"
  acquisition: "urban_indicators.csv（手動CSV）"
  trust_level: "medium"
  current_usage: "駅乗降客数 station_users を flow_bonus に正規化して使用"
  audit_rule: "個人情報を含むデータは使わず、集計済み公開データのみ候補にする。venues_per_million_station_users の分母にも使う"

station_focus:
  name: "都市内ドリルダウン / 駅別熱狂度プロトタイプ"
  category: "駅別プロトタイプ"
  acquisition: "urban_indicators.csv の主要駅乗降客数 + OSM都市合計の駅利用者比按分"
  trust_level: "low"
  current_usage: "都市スコア式は変更せず、都市詳細内で注目駅の仮スコア・分類・密度を表示"
  audit_rule: "駅周辺OSMの厳密取得ではなくプロトタイプ推定。今後は駅中心半径500m〜1kmのOSM直接取得や駅勢圏人口で検証する"

social_signal:
  name: "SNS/検索トレンド"
  category: "話題性"
  acquisition: "未接続（将来候補）"
  trust_level: "low"
  current_usage: "現時点では未使用"
  audit_rule: "利用規約と取得方法の妥当性を確認するまでスコアには入れない"
