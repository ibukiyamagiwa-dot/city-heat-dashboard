# 組織図の表示設定です（team_dashboard.py が読み込みます）。
# vertical_links: 縦連携（管理 -> 実行）
# horizontal_links: 横連携（部門をまたぐ連携）

team_title: "卒業制作 CrewAI 組織図"
team_subtitle: "階層型組織 / αβ開発 / フィードバック再開発ループ"

hierarchy_layers:
  - name: "Level 1: 統括"
    departments:
      - "統括戦略室"
      - "PMO部門"
  - name: "Level 2: 方針・検証・改善"
    departments:
      - "企画部門"
      - "監査部門"
      - "改善解決案部門"
      - "フィードバック部門"
  - name: "Level 3: 実行"
    departments:
      - "データ部門"
      - "開発部門"

departments:
  - "統括戦略室"
  - "PMO部門"
  - "企画部門"
  - "監査部門"
  - "改善解決案部門"
  - "フィードバック部門"
  - "データ部門"
  - "開発部門"

