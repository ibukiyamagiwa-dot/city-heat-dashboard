<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>寄り町 YORIMACHI — 空いた時間に、寄れる町を。</title>
  <style>
    :root {
      --bg: #f4f7f5;
      --panel: #ffffff;
      --border: #d5ddd8;
      --text: #1f2d28;
      --muted: #5f6f66;
      --accent: #2d6a4f;
      --accent-light: #d8f3dc;
      --shadow: 0 10px 28px rgba(45, 106, 79, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(216, 243, 220, .7), transparent 35%),
        linear-gradient(180deg, #fff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.55;
    }
    .wrap { max-width: 520px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { font-size: 1.75rem; margin: 0; letter-spacing: .06em; }
    .sub { color: var(--muted); font-size: 14px; margin: 6px 0 0; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px;
      margin-top: 16px;
      box-shadow: var(--shadow);
    }
    .steps {
      display: flex; gap: 6px; margin-top: 18px;
    }
    .step {
      flex: 1; text-align: center; font-size: 11px; font-weight: 700;
      padding: 8px 4px; border-radius: 999px; color: var(--muted);
      background: #eef2ef; border: 1px solid var(--border);
    }
    .step.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .step.done { background: var(--accent-light); color: var(--accent); }
    label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .search-wrap { position: relative; }
    #search {
      width: 100%; font: inherit; font-size: 16px;
      border: 2px solid var(--border); border-radius: 12px;
      padding: 12px 14px; background: #fff;
    }
    #search:focus { outline: none; border-color: var(--accent); }
    #suggestions {
      list-style: none; margin: 6px 0 0; padding: 0;
      border: 1px solid var(--border); border-radius: 12px;
      background: #fff; max-height: 220px; overflow-y: auto;
      display: none;
    }
    #suggestions.open { display: block; }
    #suggestions li {
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    #suggestions li:last-child { border-bottom: none; }
    #suggestions li:hover, #suggestions li.active { background: var(--accent-light); }
    #suggestions .lines { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .shortcut-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 14px;
    }
    .shortcut-btn {
      font: inherit; font-size: 15px; font-weight: 700;
      border: 2px solid var(--border); border-radius: 12px;
      background: #fff; padding: 14px 12px; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .shortcut-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .shortcut-btn.selected {
      border-color: var(--accent); background: var(--accent-light); color: var(--accent);
    }
    .selected-box {
      margin-top: 14px; padding: 12px 14px; border-radius: 12px;
      background: var(--accent-light); border: 1px solid #b7e4c7;
      font-size: 14px; display: none;
    }
    .selected-box.show { display: block; }
    .btn {
      display: block; width: 100%; margin-top: 16px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 12px; padding: 14px; font: inherit;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn-secondary {
      display: block; width: 100%; margin-top: 10px;
      background: #fff; color: var(--accent);
      border: 2px solid var(--border); border-radius: 12px;
      padding: 12px; font: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer;
    }
    .btn-secondary:hover { border-color: var(--accent); background: var(--accent-light); }
    .screen { display: none; }
    .screen.active { display: block; }
    .context-box {
      margin-bottom: 14px; padding: 12px 14px; border-radius: 12px;
      background: #f0f4f2; border: 1px solid var(--border); font-size: 14px;
    }
    .context-box strong { color: var(--accent); }
    .time-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    }
    .time-btn {
      font: inherit; font-size: 20px; font-weight: 700;
      border: 2px solid var(--border); border-radius: 14px;
      background: #fff; padding: 22px 12px; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .time-btn span {
      display: block; font-size: 12px; font-weight: 400;
      color: var(--muted); margin-top: 4px;
    }
    .time-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .time-btn.selected {
      border-color: var(--accent); background: var(--accent-light); color: var(--accent);
    }
    .category-row {
      display: flex; gap: 6px; margin-bottom: 14px;
    }
    .category-btn {
      flex: 1; font: inherit; font-size: 13px; font-weight: 700;
      border: 2px solid var(--border); border-radius: 999px;
      background: #fff; padding: 10px 6px; cursor: pointer;
    }
    .category-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .category-btn.selected {
      border-color: var(--accent); background: var(--accent); color: #fff;
    }
    .town-list { display: flex; flex-direction: column; gap: 8px; }
    .town-card {
      width: 100%; text-align: left; font: inherit;
      border: 2px solid var(--border); border-radius: 14px;
      background: #fff; padding: 14px 14px; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .town-card:hover { border-color: var(--accent); background: var(--accent-light); }
    .town-name { font-size: 17px; font-weight: 700; }
    .town-tagline { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .town-meta { font-size: 12px; color: var(--accent); margin-top: 6px; font-weight: 700; }
    .empty-msg {
      padding: 20px 14px; text-align: center; color: var(--muted);
      font-size: 14px; border: 1px dashed var(--border); border-radius: 12px;
    }
    .result-headline {
      font-size: 18px; font-weight: 700; margin: 0 0 12px;
      color: var(--accent); line-height: 1.4;
    }
    .result-town { margin-bottom: 14px; }
    .result-town h2 { font-size: 22px; margin: 0 0 4px; }
    .result-town p { margin: 0; color: var(--muted); font-size: 14px; }
    .route-box {
      padding: 12px 14px; border-radius: 12px;
      background: #f0f4f2; border: 1px solid var(--border);
      font-size: 13px; line-height: 1.6;
    }
    .route-box .route-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      margin-bottom: 6px; display: block;
    }
    .flavor-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .flavor-tag {
      font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 999px; background: var(--accent-light);
      color: var(--accent); border: 1px solid #b7e4c7;
    }
    .meta { font-size: 12px; color: var(--muted); margin-top: 12px; }
    footer { margin-top: 20px; font-size: 12px; color: var(--muted); }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>寄り町</h1>
      <p class="sub">空いた時間に、寄れる町を。</p>
      <nav class="steps" aria-label="進行ステップ">
        <span class="step active" id="step1Label">1. 出発</span>
        <span class="step" id="step2Label">2. 時間</span>
        <span class="step" id="step3Label">3. 寄り町</span>
      </nav>
    </header>

    <div id="step1Screen" class="screen active">
      <section class="panel">
        <label for="search">どこから出る？</label>
        <div class="search-wrap">
          <input id="search" type="search" placeholder="駅名・エリアで検索" autocomplete="off" />
          <ul id="suggestions" role="listbox"></ul>
        </div>

        <p class="meta" style="margin-top:14px;margin-bottom:0;">よく使うエリア</p>
        <div class="shortcut-grid" id="shortcuts"></div>

        <div class="selected-box" id="selectedBox">
          出発: <strong id="selectedName">—</strong>
        </div>

        <button class="btn" id="toStep2Btn" type="button" disabled>時間を選ぶ</button>
        <p class="meta" id="step1Meta">出発駅を選ぶと次へ進めます。</p>
      </section>
    </div>

    <div id="step2Screen" class="screen">
      <section class="panel">
        <div class="context-box" id="step2Context">
          <strong id="step2FromName">—</strong> から出発
        </div>

        <label>どのくらい寄れる？</label>
        <p class="meta" style="margin-top:0;margin-bottom:12px;">移動に使えるだいたいの時間</p>
        <div class="time-grid" id="timeGrid"></div>

        <div class="selected-box" id="timeSelectedBox">
          使える時間: <strong id="selectedTimeLabel">—</strong>
        </div>

        <button class="btn" id="toStep3Btn" type="button" disabled>寄り町を選ぶ</button>
        <button class="btn-secondary" id="backToStep1Btn" type="button">出発地を変える</button>
      </section>
    </div>

    <div id="step3Screen" class="screen">
      <section class="panel">
        <div class="context-box" id="step3Context">
          <strong id="step3FromName">—</strong> から · 使える時間 <strong id="step3Minutes">—</strong>
        </div>

        <label>今日の寄り町</label>
        <p class="meta" style="margin-top:0;margin-bottom:12px;">ふらっと寄れる町から選ぶ</p>

        <div class="category-row" id="categoryRow"></div>
        <div class="town-list" id="townList"></div>
        <p class="meta" id="step3Meta"></p>

        <button class="btn-secondary" id="backToStep2Btn" type="button">時間を変える</button>
      </section>
    </div>

    <div id="resultScreen" class="screen">
      <section class="panel">
        <p class="result-headline" id="resultHeadline">—</p>

        <div class="result-town">
          <h2 id="resultTownName">—</h2>
          <p id="resultTownTagline">—</p>
        </div>

        <div class="route-box">
          <span class="route-label">だいたいのルート</span>
          <span id="resultRoute">—</span>
          <span class="route-label" id="resultTransfers" style="margin-top:10px;"></span>
        </div>

        <div class="flavor-tags" id="resultFlavors"></div>

        <button class="btn-secondary" id="backToStep3Btn" type="button">別の町を見る</button>
        <button class="btn-secondary" id="restartBtn" type="button">最初からやり直す</button>
      </section>
    </div>

    <footer>
      <p>鉄道データ: 国土数値情報 N02（<code>rail_graph.json</code>）</p>
      <p><a href="YORIMACHI_GUIDE.md">YORIMACHI_GUIDE.md</a> ／
         <a href="index.html">研究概要</a> ／
         <a href="tokyo_climb.html">TOKYO CLIMB（試作）</a></p>
    </footer>
  </div>

  <script src="yorimachi_data.js"></script>
  <script>
    "use strict";
    const DATA = window.YORIMACHI_DATA;
    const stations = DATA.stations;
    const towns = DATA.towns;
    const shortcuts = DATA.departure_shortcuts;
    const TIME_OPTIONS = [
      { minutes: 15, hint: "ちょい寄り" },
      { minutes: 30, hint: "ふらっと" },
      { minutes: 45, hint: "ゆったり" },
      { minutes: 60, hint: "のんびり" },
    ];
    const ROUTING = DATA.routing || {};
    const TRANSFER_PENALTY = ROUTING.transfer_penalty_minutes ?? 5;
    const FIT_MARGIN = ROUTING.time_fit_margin_minutes ?? 5;
    const CATEGORIES = [
      { id: "recommend", label: "おすすめ" },
      { id: "quick", label: "すぐ行ける" },
      { id: "relaxed", label: "のんびり" },
    ];

    let selectedId = null;
    let selectedMinutes = null;
    let selectedCategory = "recommend";
    let reachableTowns = [];
    const adj = buildAdj(DATA.graph_edges || []);

    const step1Screen = document.getElementById("step1Screen");
    const step2Screen = document.getElementById("step2Screen");
    const step3Screen = document.getElementById("step3Screen");
    const resultScreen = document.getElementById("resultScreen");
    const step1Label = document.getElementById("step1Label");
    const step2Label = document.getElementById("step2Label");
    const step3Label = document.getElementById("step3Label");
    const searchEl = document.getElementById("search");
    const suggestEl = document.getElementById("suggestions");
    const shortcutsEl = document.getElementById("shortcuts");
    const selectedBox = document.getElementById("selectedBox");
    const selectedName = document.getElementById("selectedName");
    const toStep2Btn = document.getElementById("toStep2Btn");
    const step2FromName = document.getElementById("step2FromName");
    const timeGrid = document.getElementById("timeGrid");
    const timeSelectedBox = document.getElementById("timeSelectedBox");
    const selectedTimeLabel = document.getElementById("selectedTimeLabel");
    const toStep3Btn = document.getElementById("toStep3Btn");
    const backToStep1Btn = document.getElementById("backToStep1Btn");
    const step3FromName = document.getElementById("step3FromName");
    const step3Minutes = document.getElementById("step3Minutes");
    const categoryRow = document.getElementById("categoryRow");
    const townList = document.getElementById("townList");
    const step3Meta = document.getElementById("step3Meta");
    const backToStep2Btn = document.getElementById("backToStep2Btn");
    const resultHeadline = document.getElementById("resultHeadline");
    const resultTownName = document.getElementById("resultTownName");
    const resultTownTagline = document.getElementById("resultTownTagline");
    const resultRoute = document.getElementById("resultRoute");
    const resultTransfers = document.getElementById("resultTransfers");
    const resultFlavors = document.getElementById("resultFlavors");
    const backToStep3Btn = document.getElementById("backToStep3Btn");
    const restartBtn = document.getElementById("restartBtn");

    const byId = {};
    stations.forEach((s) => { byId[s.id] = s; });

    function buildAdj(edges) {
      const graph = {};
      edges.forEach((e) => {
        if (!graph[e.from]) graph[e.from] = [];
        graph[e.from].push({ to: e.to, minutes: e.minutes, line: e.line });
      });
      return graph;
    }

    function stateKey(node, line) {
      return `${node}|${line || ""}`;
    }

    function shortestPath(fromId, toId) {
      if (fromId === toId) {
        return { minutes: 0, path: [fromId], transfers: 0 };
      }

      const dist = new Map();
      const prev = new Map();
      const heap = [];

      const startKey = stateKey(fromId, null);
      dist.set(startKey, 0);
      prev.set(startKey, null);
      heap.push({ node: fromId, line: null, cost: 0, key: startKey });

      while (heap.length) {
        heap.sort((a, b) => a.cost - b.cost);
        const state = heap.shift();
        if (state.cost > (dist.get(state.key) ?? Infinity)) continue;

        (adj[state.node] || []).forEach((edge) => {
          const transfer = state.line && edge.line !== state.line ? TRANSFER_PENALTY : 0;
          const newCost = state.cost + edge.minutes + transfer;
          const newKey = stateKey(edge.to, edge.line);
          if (newCost < (dist.get(newKey) ?? Infinity)) {
            dist.set(newKey, newCost);
            prev.set(newKey, { prevKey: state.key, edge });
            heap.push({ node: edge.to, line: edge.line, cost: newCost, key: newKey });
          }
        });
      }

      let bestKey = null;
      let bestCost = Infinity;
      dist.forEach((cost, key) => {
        if (!key.startsWith(`${toId}|`) || cost >= bestCost) return;
        bestCost = cost;
        bestKey = key;
      });
      if (!bestKey) return null;

      const edgesUsed = [];
      let key = bestKey;
      while (prev.get(key)) {
        const step = prev.get(key);
        if (step.edge) edgesUsed.unshift(step.edge);
        key = step.prevKey;
      }

      const path = [fromId];
      edgesUsed.forEach((edge) => {
        if (path[path.length - 1] !== edge.from) path.push(edge.from);
        path.push(edge.to);
      });

      let transfers = 0;
      for (let i = 1; i < edgesUsed.length; i++) {
        if (edgesUsed[i].line !== edgesUsed[i - 1].line) transfers += 1;
      }

      return { minutes: bestCost, path, transfers, edges: edgesUsed };
    }

    function timeFitRange(selected) {
      return [selected - FIT_MARGIN, selected + FIT_MARGIN];
    }

    function computeReachable(fromId, selected) {
      const limit = selected + FIT_MARGIN;
      const results = [];
      towns.forEach((town) => {
        if (!town.in_graph || !town.hub_node_id) return;
        if (town.hub_node_id === fromId) return;
        const route = shortestPath(fromId, town.hub_node_id);
        if (!route || route.minutes > limit) return;
        results.push({
          town,
          minutes: route.minutes,
          path: route.path,
          transfers: route.transfers,
        });
      });
      return results;
    }

    function pickCategory(list, categoryId, selected) {
      if (!list.length) return [];
      const [fitLo, fitHi] = timeFitRange(selected);
      if (categoryId === "recommend") {
        const fitted = list.filter((item) => item.minutes >= fitLo && item.minutes <= fitHi);
        return [...fitted]
          .sort((a, b) => Math.abs(a.minutes - selected) - Math.abs(b.minutes - selected))
          .slice(0, 8);
      }
      if (categoryId === "quick") {
        const within = list.filter((item) => item.minutes <= selected);
        return [...within].sort((a, b) => a.minutes - b.minutes).slice(0, 8);
      }
      if (categoryId === "relaxed") {
        const within = list.filter((item) => item.minutes <= selected);
        const filtered = within.filter((item) => (item.town.flavors || []).includes("のんびり"));
        return [...filtered].sort((a, b) => a.minutes - b.minutes).slice(0, 8);
      }
      return [];
    }

    function formatRoute(path) {
      return path.map((id) => byId[id]?.name || id).join(" → ");
    }

    function setStepLabels(activeStep) {
      const labels = [step1Label, step2Label, step3Label];
      labels.forEach((el, i) => {
        const step = i + 1;
        el.classList.remove("active", "done");
        if (step < activeStep) el.classList.add("done");
        else if (step === activeStep) el.classList.add("active");
      });
      if (activeStep > 3) {
        labels.forEach((el) => {
          el.classList.remove("active");
          el.classList.add("done");
        });
      }
    }

    function showScreen(screen) {
      step1Screen.classList.toggle("active", screen === 1);
      step2Screen.classList.toggle("active", screen === 2);
      step3Screen.classList.toggle("active", screen === 3);
      resultScreen.classList.toggle("active", screen === 4);
      setStepLabels(screen > 3 ? 4 : screen);
      window.scrollTo({ top: 0, behavior: "smooth" });
      if (screen === 2) {
        step2FromName.textContent = byId[selectedId].name;
        updateTimeSelection();
      }
      if (screen === 3) {
        step3FromName.textContent = byId[selectedId].name;
        step3Minutes.textContent = `${selectedMinutes} 分`;
        reachableTowns = computeReachable(selectedId, selectedMinutes);
        renderTownList();
      }
    }

    function renderTownList() {
      const items = pickCategory(reachableTowns, selectedCategory, selectedMinutes);
      const [fitLo, fitHi] = timeFitRange(selectedMinutes);
      townList.innerHTML = "";
      if (!items.length) {
        const hint =
          selectedCategory === "recommend"
            ? `おすすめは移動 ${fitLo}〜${fitHi} 分程度の町を表示します。`
            : "この条件では寄れる町がありません。";
        townList.innerHTML =
          `<div class="empty-msg">${hint}<br>時間を変えるか、出発地を変えてください。</div>`;
      } else {
        items.forEach((item) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "town-card";
          const flavors = (item.town.flavors || []).slice(0, 3).join("・");
          const transferHint = item.transfers > 0 ? ` · 乗換${item.transfers}` : "";
          btn.innerHTML =
            `<div class="town-name">${item.town.name}</div>` +
            `<div class="town-tagline">${item.town.tagline}</div>` +
            `<div class="town-meta">だいたい ${item.minutes} 分${transferHint}${flavors ? ` · ${flavors}` : ""}</div>`;
          btn.addEventListener("click", () => showResult(item));
          townList.appendChild(btn);
        });
      }
      const cat = CATEGORIES.find((c) => c.id === selectedCategory);
      step3Meta.textContent =
        `表示 ${items.length} 件 · ${cat.label} · おすすめは ${fitLo}〜${fitHi} 分 · 全 ${reachableTowns.length} 町が到達可能`;
    }

    function showResult(item) {
      const fromName = byId[selectedId].name;
      resultHeadline.textContent =
        `今日の寄り町：${fromName} → ${item.town.name}（だいたい ${item.minutes} 分）`;
      resultTownName.textContent = item.town.name;
      resultTownTagline.textContent = item.town.tagline;
      resultRoute.textContent = formatRoute(item.path);
      resultTransfers.textContent =
        `乗換 ${item.transfers} 回（乗換は目安 +${TRANSFER_PENALTY} 分/回を加算）`;
      resultFlavors.innerHTML = "";
      (item.town.flavors || []).forEach((f) => {
        const span = document.createElement("span");
        span.className = "flavor-tag";
        span.textContent = f;
        resultFlavors.appendChild(span);
      });
      showScreen(4);
    }

    function selectCategory(id) {
      selectedCategory = id;
      document.querySelectorAll(".category-btn").forEach((btn) => {
        btn.classList.toggle("selected", btn.dataset.id === id);
      });
      renderTownList();
    }

    function selectMinutes(minutes) {
      selectedMinutes = minutes;
      selectedTimeLabel.textContent = `${minutes} 分`;
      timeSelectedBox.classList.add("show");
      document.querySelectorAll(".time-btn").forEach((btn) => {
        btn.classList.toggle("selected", Number(btn.dataset.minutes) === minutes);
      });
      toStep3Btn.disabled = false;
    }

    function updateTimeSelection() {
      if (selectedMinutes) {
        selectMinutes(selectedMinutes);
      } else {
        timeSelectedBox.classList.remove("show");
        selectedTimeLabel.textContent = "—";
        document.querySelectorAll(".time-btn").forEach((btn) => btn.classList.remove("selected"));
        toStep3Btn.disabled = true;
      }
    }

    function normalize(q) {
      return (q || "").trim().toLowerCase();
    }

    function filterStations(q) {
      const n = normalize(q);
      if (!n) return [];
      return stations
        .filter((s) => s.name.includes(q) || s.slug.includes(n) || (s.lines || []).some((l) => l.includes(q)))
        .slice(0, 12);
    }

    function selectStation(id) {
      const s = byId[id];
      if (!s) return;
      selectedId = id;
      selectedName.textContent = s.name;
      selectedBox.classList.add("show");
      searchEl.value = s.name;
      suggestEl.classList.remove("open");
      suggestEl.innerHTML = "";
      document.querySelectorAll(".shortcut-btn").forEach((btn) => {
        btn.classList.toggle("selected", btn.dataset.id === id);
      });
      toStep2Btn.disabled = false;
    }

    function renderSuggestions(list) {
      suggestEl.innerHTML = "";
      if (!list.length) {
        suggestEl.classList.remove("open");
        return;
      }
      list.forEach((s, i) => {
        const li = document.createElement("li");
        li.role = "option";
        li.dataset.id = s.id;
        if (i === 0) li.classList.add("active");
        const lineHint = (s.lines || []).slice(0, 2).join("・");
        li.innerHTML = `${s.name}<div class="lines">${lineHint || "—"}</div>`;
        li.addEventListener("mousedown", (e) => {
          e.preventDefault();
          selectStation(s.id);
        });
        suggestEl.appendChild(li);
      });
      suggestEl.classList.add("open");
    }

    searchEl.addEventListener("input", () => {
      renderSuggestions(filterStations(searchEl.value));
    });
    searchEl.addEventListener("focus", () => {
      if (searchEl.value) renderSuggestions(filterStations(searchEl.value));
    });
    searchEl.addEventListener("blur", () => {
      setTimeout(() => suggestEl.classList.remove("open"), 150);
    });

    shortcuts.forEach((sc) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "shortcut-btn";
      btn.dataset.id = sc.node_id;
      btn.textContent = sc.label;
      btn.addEventListener("click", () => selectStation(sc.node_id));
      shortcutsEl.appendChild(btn);
    });

    toStep2Btn.addEventListener("click", () => {
      if (!selectedId) return;
      showScreen(2);
    });

    backToStep1Btn.addEventListener("click", () => {
      showScreen(1);
    });

    toStep3Btn.addEventListener("click", () => {
      if (!selectedId || !selectedMinutes) return;
      showScreen(3);
    });

    backToStep2Btn.addEventListener("click", () => showScreen(2));
    backToStep3Btn.addEventListener("click", () => showScreen(3));
    restartBtn.addEventListener("click", () => {
      selectedId = null;
      selectedMinutes = null;
      selectCategory("recommend");
      searchEl.value = "";
      selectedBox.classList.remove("show");
      timeSelectedBox.classList.remove("show");
      toStep2Btn.disabled = true;
      toStep3Btn.disabled = true;
      document.querySelectorAll(".shortcut-btn").forEach((btn) => btn.classList.remove("selected"));
      document.querySelectorAll(".time-btn").forEach((btn) => btn.classList.remove("selected"));
      showScreen(1);
    });

    CATEGORIES.forEach((cat) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "category-btn";
      btn.dataset.id = cat.id;
      btn.textContent = cat.label;
      if (cat.id === selectedCategory) btn.classList.add("selected");
      btn.addEventListener("click", () => selectCategory(cat.id));
      categoryRow.appendChild(btn);
    });

    TIME_OPTIONS.forEach((opt) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "time-btn";
      btn.dataset.minutes = String(opt.minutes);
      btn.innerHTML = `${opt.minutes}分<span>${opt.hint}</span>`;
      btn.addEventListener("click", () => selectMinutes(opt.minutes));
      timeGrid.appendChild(btn);
    });

    const stats = DATA.graph_meta && DATA.graph_meta.stats;
    if (stats) {
      document.getElementById("step1Meta").textContent +=
        ` ／ 駅ノード ${stats.nodes}・路線エッジ ${stats.edges}`;
    }
  </script>
</body>
</html>
