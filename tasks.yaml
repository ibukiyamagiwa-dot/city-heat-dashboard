# このファイルは「反復改善型のタスク定義」です。
# 実行順は上から順番ですが、各タスクは複数部門の出力を参照し、
# 縦（管理↔実行）と横（部門間）を意識した改善ループを回します。

program_alignment_task:
  agent: strategy_mgmt
  description: |
    今回のスプリント方針を定義してください。
    条件:
    - 実現可能性を最優先
    - 都市熱狂度の可視化価値を明確化
    - 1スプリント内で完了可能な範囲に絞る
  expected_output: "スプリント目標、制約、評価指標をまとめた方針書"
  markdown: true

coordination_task:
  agent: pmo_mgmt
  description: |
    統括方針を受けて、各部門が横連携しながら改善を繰り返すための運用ルールを決めてください。
    必須:
    - 未達Todoを次ラウンドへ持ち越すルール
    - α版/β版のフィードバックを開発へ戻すルール
    - データ監査でNGが出た場合の差し戻しルール
  expected_output: "反復改善サイクルの運用ルール"
  markdown: true
  context:
    - program_alignment_task

planning_round1_task:
  agent: planner_exec
  description: |
    方針書を基に、都市可視化アプリの初版企画案（Round1）を作成してください。
    必須:
    - 想定ユーザー
    - 表示する都市指標
    - MVP画面構成
    - 未対応機能（後回し）
  expected_output: "Round1企画案"
  markdown: true
  context:
    - program_alignment_task
    - coordination_task

data_round1_task:
  agent: data_exec
  description: |
    Round1企画案に必要なデータを収集・整形する計画を作成してください。
    必須:
    - データ出典
    - 取得方法
    - 更新頻度
    - 欠損補完ルール
  expected_output: "Round1データ設計と収集計画"
  markdown: true
  context:
    - planning_round1_task

audit_round1_task:
  agent: audit_exec
  description: |
    Round1の企画案とデータ計画を監査してください。
    特に以下を必須監査:
    - データに虚偽・捏造・整合性崩れがないか
    - 出典が追跡可能か
    - 利用規約違反がないか
    - 個人情報や倫理リスクがないか
  expected_output: "Round1監査レポート（問題点・修正要求・信頼性判定）"
  markdown: true
  context:
    - planning_round1_task
    - data_round1_task

dev_alpha_task:
  agent: dev_exec
  description: |
    Round1監査結果を反映し、α版の実装計画を作成してください。
    条件:
    - 2〜3週間で動作可能
    - 必須機能は最大5個
    - 監査で指摘されたデータ検証を実装項目に含める
  expected_output: "α版実装計画（機能・画面・データ処理・検証）"
  markdown: true
  context:
    - planning_round1_task
    - data_round1_task
    - audit_round1_task

alpha_feedback_task:
  agent: feedback_exec
  description: |
    α版計画に対して、プロデューサー・利用者・監査部門の視点からフィードバックを整理してください。
    必須:
    - 使いにくい点
    - データ信頼性で不安な点
    - 視覚的に分かりにくい点
    - 未達Todo
  expected_output: "α版フィードバックと未達Todo一覧"
  markdown: true
  context:
    - dev_alpha_task
    - audit_round1_task

solution_alpha_task:
  agent: solution_exec
  description: |
    α版フィードバックと未達Todoに対して、解決案を作成してください。
    企画部門は初期企画だけでなく、改善点への解決案も出す必要があります。
    必須:
    - 未達Todoごとの原因
    - 企画側の解決案
    - データ側の解決案
    - 開発側の解決案
    - 次ラウンドで必ず直す項目
  expected_output: "α版改善解決案（部門別の修正方針）"
  markdown: true
  context:
    - alpha_feedback_task
    - dev_alpha_task

cross_function_review_task:
  agent: pmo_exec
  description: |
    企画・監査・データ・開発のRound1成果を横断レビューしてください。
    出力要件:
    - 部門間の矛盾点
    - 依存関係の詰まり
    - 次ラウンドで優先修正すべき上位5項目
  expected_output: "横断レビュー結果（部門横連携の課題と修正優先順位）"
  markdown: true
  context:
    - planning_round1_task
    - data_round1_task
    - audit_round1_task
    - dev_alpha_task
    - alpha_feedback_task
    - solution_alpha_task

planning_round2_task:
  agent: planner_exec
  description: |
    横断レビューを受けて企画案をRound2へ改善してください。
    条件:
    - 変更理由を明記
    - 削る機能/追加する機能を分離
    - β版を見据えた拡張余地も示す
    - α版フィードバックへの解決策を含める
  expected_output: "Round2企画案（差分付き）"
  markdown: true
  context:
    - cross_function_review_task
    - solution_alpha_task

data_round2_task:
  agent: data_exec
  description: |
    Round2企画に合わせてデータ計画を更新してください。
    必須:
    - 真偽確認プロセス（出典照合/異常値検知）
    - データ品質KPI
    - 運用時のエラー対応フロー
  expected_output: "Round2データ運用計画（品質管理付き）"
  markdown: true
  context:
    - planning_round2_task
    - cross_function_review_task

dev_beta_task:
  agent: dev_exec
  description: |
    Round2成果を基にβ版改善計画を作成してください。
    条件:
    - 安定性と可読性の改善を優先
    - 監査で指摘された検証機能を標準搭載
    - 受け入れテスト項目を明確化
  expected_output: "β版改善計画（優先度付きバックログ）"
  markdown: true
  context:
    - planning_round2_task
    - data_round2_task
    - dev_alpha_task

beta_feedback_task:
  agent: feedback_exec
  description: |
    β版改善計画に対してフィードバックを行い、未達Todoを再抽出してください。
    必須:
    - α版から改善された点
    - まだ弱い点
    - 提出前に直すべき未達Todo
    - 再開発が必要な箇所
  expected_output: "β版フィードバックと再開発Todo"
  markdown: true
  context:
    - dev_beta_task
    - data_round2_task

redevelopment_task:
  agent: dev_exec
  description: |
    β版フィードバックを受けて、再開発計画を作成してください。
    未達Todoが残っている場合は、達成するための修正計画を作り、
    修正後に新しいTodoを作成して次の改善ループへつなげてください。
    必須:
    - 再開発対象
    - 修正内容
    - 完了条件
    - 次に発生しうる新Todo
  expected_output: "再開発計画と次Todoリスト"
  markdown: true
  context:
    - beta_feedback_task
    - dev_beta_task

todo_iteration_task:
  agent: pmo_exec
  description: |
    ここまでのTodoを整理し、未達Todoを達成済み/継続/新規に分類してください。
    未達がある場合は、どの部門へ戻すべきかを明示してください。
    必須:
    - 達成済みTodo
    - 未達Todo
    - 未達の差し戻し先部門
    - 新しく作成されたTodo
    - 次スプリントの優先順位
  expected_output: "反復Todo管理表"
  markdown: true
  context:
    - alpha_feedback_task
    - solution_alpha_task
    - beta_feedback_task
    - redevelopment_task

management_gate_task:
  agent: audit_mgmt
  description: |
    各部門成果（Round2企画/データ計画/αβ開発計画）を管理者視点で最終評価してください。
    必須:
    - データ真偽監査の合否
    - 卒業制作提出可否判定
    - 不可の場合の必須修正3点以上
  expected_output: "最終ゲート判定（提出可否・根拠・必須修正）"
  markdown: true
  context:
    - planning_round2_task
    - data_round2_task
    - dev_alpha_task
    - dev_beta_task
    - beta_feedback_task
    - redevelopment_task
    - todo_iteration_task

secretary_task:
  agent: pmo_exec
  description: |
    すべての成果を統合し、非エンジニア向けの進捗報告書を作成してください。
    必須見出し:
    1. 現在の採用案（Round2）
    2. データ真偽監査の結果
    3. α版の開発方針
    4. α版フィードバックと解決案
    5. β版の改善方針
    6. β版フィードバックと再開発方針
    7. Todo達成状況と次Todo
    8. 縦連携（管理↔実行）の状況
    9. 横連携（部門間）の状況
    10. 現在の完了ステータス
    11. 次のステップ（ToDo）
  expected_output: "progress.md にそのまま使える日本語Markdown"
  markdown: true
  context:
    - program_alignment_task
    - planning_round1_task
    - data_round1_task
    - audit_round1_task
    - dev_alpha_task
    - alpha_feedback_task
    - solution_alpha_task
    - cross_function_review_task
    - planning_round2_task
    - data_round2_task
    - dev_beta_task
    - beta_feedback_task
    - redevelopment_task
    - todo_iteration_task
    - management_gate_task
  output_file: "progress.md"
